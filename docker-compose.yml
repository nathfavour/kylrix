# ─────────────────────────────────────────────────────────────────────────────
# Kylrix — Full Self-Hosting Stack
# Includes: Kylrix App + Appwrite Backend + MariaDB + Redis + Caddy (HTTPS)
#
# Usage:
#   make setup    — Run the interactive setup wizard first
#   make up       — Start the entire stack
#   make app-only — Start only Kylrix + Caddy (if you have external Appwrite)
# ─────────────────────────────────────────────────────────────────────────────

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ── Caddy — Automatic HTTPS reverse proxy ─────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: kylrix-caddy
    <<: *common
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3 QUIC
    volumes:
      - ./selfhost/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - APPWRITE_DOMAIN=${APPWRITE_DOMAIN:-appwrite.localhost}
    depends_on:
      kylrix:
        condition: service_healthy
    networks:
      - kylrix-net

  # ── Kylrix — The Next.js application ──────────────────────────────────────
  kylrix:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_APPWRITE_ENDPOINT=${APPWRITE_ENDPOINT:-http://appwrite/v1}
        - NEXT_PUBLIC_APPWRITE_PROJECT_ID=${APPWRITE_PROJECT_ID:-kylrix-selfhost}
        - NEXT_PUBLIC_DOMAIN=${DOMAIN:-localhost}
    container_name: kylrix-app
    <<: *common
    expose:
      - "3000"
    env_file:
      # Defaults to the contributor profile; Ota's self-hosted workflow selects its isolated file.
      - ${KYLRIX_ENV_FILE:-.env}
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('http');const r=http.request({hostname:'127.0.0.1',port:3000,path:'/',timeout:3000},res=>{process.exit(res.statusCode<500?0:1)});r.on('error',()=>process.exit(1));r.end()"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    depends_on:
      appwrite:
        condition: service_healthy
    networks:
      - kylrix-net

  # ── Appwrite — Backend-as-a-Service ───────────────────────────────────────
  appwrite:
    image: appwrite/appwrite:1.6
    container_name: kylrix-appwrite
    <<: *common
    expose:
      - "80"
    volumes:
      - appwrite_uploads:/storage/uploads
      - appwrite_cache:/storage/cache
      - appwrite_certs:/storage/certificates
      - appwrite_functions:/storage/functions
      - appwrite_config:/storage/config
    environment:
      - _APP_ENV=production
      - _APP_LOCALE=en
      - _APP_CONSOLE_WHITELIST_ROOT=enabled
      - _APP_CONSOLE_WHITELIST_EMAILS=
      - _APP_SYSTEM_EMAIL_NAME=Kylrix
      - _APP_SYSTEM_EMAIL_ADDRESS=noreply@${DOMAIN:-localhost}
      - _APP_SYSTEM_RESPONSE_FORMAT=
      - _APP_OPTIONS_ABUSE=disabled
      - _APP_OPTIONS_FORCE_HTTPS=disabled
      - _APP_OPENSSL_KEY_V1=${APPWRITE_OPENSSL_KEY:-your-secret-key-min-128-bits}
      - _APP_DOMAIN=${APPWRITE_DOMAIN:-appwrite.localhost}
      - _APP_DOMAIN_TARGET=${APPWRITE_DOMAIN:-appwrite.localhost}
      - _APP_DOMAIN_FUNCTIONS=${APPWRITE_DOMAIN:-appwrite.localhost}
      - _APP_REDIS_HOST=redis
      - _APP_REDIS_PORT=6379
      - _APP_DB_HOST=mariadb
      - _APP_DB_PORT=3306
      - _APP_DB_SCHEMA=appwrite
      - _APP_DB_USER=${MARIADB_USER:-appwrite}
      - _APP_DB_PASS=${MARIADB_PASSWORD:-appwrite-secret}
      - _APP_DB_ROOT_PASS=${MARIADB_ROOT_PASSWORD:-rootsecret}
      - _APP_USAGE_STATS=enabled
      - _APP_STORAGE_LIMIT=536870912      # 512MB
      - _APP_STORAGE_PREVIEW_LIMIT=20000000 # 20MB
      - _APP_STORAGE_ANTIVIRUS=disabled
      - _APP_SMTP_HOST=${SMTP_HOST:-}
      - _APP_SMTP_PORT=${SMTP_PORT:-587}
      - _APP_SMTP_SECURE=${SMTP_SECURE:-tls}
      - _APP_SMTP_USERNAME=${SMTP_USERNAME:-}
      - _APP_SMTP_PASSWORD=${SMTP_PASSWORD:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kylrix-net

  # ── MariaDB — Appwrite's database ────────────────────────────────────────
  mariadb:
    image: mariadb:10.11
    container_name: kylrix-mariadb
    <<: *common
    command: >
      --innodb-flush-log-at-trx-commit=2
      --innodb-buffer-pool-size=256M
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
    volumes:
      - mariadb_data:/var/lib/mysql
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootsecret}
      MARIADB_DATABASE: appwrite
      MARIADB_USER: ${MARIADB_USER:-appwrite}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-appwrite-secret}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - kylrix-net

  # ── Redis — Appwrite's cache & pub/sub ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kylrix-redis
    <<: *common
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - kylrix-net

# ── Volumes — Persistent data ────────────────────────────────────────────────
volumes:
  caddy_data:
  caddy_config:
  appwrite_uploads:
  appwrite_cache:
  appwrite_certs:
  appwrite_functions:
  appwrite_config:
  mariadb_data:
  redis_data:

# ── Network ──────────────────────────────────────────────────────────────────
networks:
  kylrix-net:
    driver: bridge
