# ─────────────────────────────────────────────────────────────────────────────
# Kylrix — App-Only Override
# Use this if you already have Appwrite running externally.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.app-only.yml up -d
#   — or —
#   make app-only
# ─────────────────────────────────────────────────────────────────────────────

services:
  # Override kylrix to remove Appwrite dependency and point to external endpoint
  kylrix:
    build:
      args:
        - NEXT_PUBLIC_APPWRITE_ENDPOINT=${APPWRITE_ENDPOINT:?Set APPWRITE_ENDPOINT in .env}
        - NEXT_PUBLIC_APPWRITE_PROJECT_ID=${APPWRITE_PROJECT_ID:?Set APPWRITE_PROJECT_ID in .env}
        - NEXT_PUBLIC_DOMAIN=${DOMAIN:-localhost}
    depends_on: {}  # Remove bundled Appwrite dependency

  # Disable bundled services (they're not needed)
  appwrite:
    profiles: ["disabled"]
  mariadb:
    profiles: ["disabled"]
  redis:
    profiles: ["disabled"]
